<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="30%" style="stop-color:#2563eb"/>
      <stop offset="60%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#d4a843"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b8932a"/>
      <stop offset="100%" style="stop-color:#f0c96a"/>
    </linearGradient>
  </defs>
  <!-- Outer gradient ring -->
  <circle cx="250" cy="250" r="230" fill="none" stroke="url(#ringGrad)" stroke-width="18" stroke-linecap="round" opacity="0.9"/>
  <circle cx="250" cy="250" r="215" fill="none" stroke="url(#ringGrad)" stroke-width="6" stroke-linecap="round" opacity="0.4"/>

  <!-- Shield -->
  <path d="M250 60 L310 90 L310 175 Q310 220 250 248 Q190 220 190 175 L190 90 Z" fill="url(#shieldGrad)"/>
  <path d="M250 72 L300 98 L300 173 Q300 210 250 234 Q200 210 200 173 L200 98 Z" fill="none" stroke="white" stroke-width="3" opacity="0.4"/>

  <!-- Handshake icon (simplified) -->
  <circle cx="250" cy="165" r="28" fill="white" opacity="0.2"/>
  <path d="M235 158 Q250 145 265 158 L272 168 Q260 158 250 162 Q240 158 228 168 Z" fill="white" opacity="0.9"/>
  <path d="M228 168 L236 178 L244 172 L250 176 L256 172 L264 178 L272 168" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M236 178 L238 188" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <path d="M264 178 L262 188" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Arrow (upward trending) -->
  <path d="M225 200 L255 140 L285 200" fill="none" stroke="url(#arrowGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M270 130 L290 118 L302 138" fill="none" stroke="url(#arrowGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M276 110 L302 138 L274 148" fill="url(#arrowGrad)" stroke="none"/>

  <!-- Text: Myclientwork -->
  <text x="250" y="315" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-2" fill="#0f172a">Myclientwork</text>

  <!-- Tagline -->
  <text x="250" y="355" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" letter-spacing="1.5" fill="#374151">DIGITAL SERVICES . PROFESSIONAL SOLUTIONS . GROWTH</text>
</svg>
